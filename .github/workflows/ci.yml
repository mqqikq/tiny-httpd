name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (strict warnings)
        run: make

      - name: Unit tests
        run: make unit-test

      - name: Integration tests
        run: python3 tests/integration_test.py ./build/httpd

      - name: Build with ASan + UBSan
        run: make asan

      - name: Integration tests under ASan + UBSan
        run: python3 tests/integration_test.py ./build/httpd

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: valgrind (memory + fd leak check, incl. keep-alive and idle timeout)
        run: bash tests/valgrind_check.sh
