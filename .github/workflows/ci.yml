name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (strict warnings)
        run: make

      - name: Unit tests
        run: make unit-test

      - name: Integration tests
        run: python3 tests/integration_test.py ./build/httpd

      - name: Build with ASan + UBSan
        run: make asan

      - name: Integration tests under ASan + UBSan
        run: python3 tests/integration_test.py ./build/httpd

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: valgrind (memory + fd leak check, incl. keep-alive and idle timeout)
        run: bash tests/valgrind_check.sh

      - name: Docker image builds and serves
        run: |
          docker build -t tiny-httpd:ci .
          docker run -d --rm --name tiny-httpd-ci -p 18080:8080 tiny-httpd:ci -p 8080
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:18080/ -o /dev/null && break
            sleep 0.5
          done
          curl -sf http://127.0.0.1:18080/ -o /dev/null
          curl -sf http://127.0.0.1:18080/metrics -o /dev/null
          curl -sf http://127.0.0.1:18080/dashboard -o /dev/null
          docker stop tiny-httpd-ci
